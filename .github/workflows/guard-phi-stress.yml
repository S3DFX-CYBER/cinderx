name: Guard Phi Research

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # 1. Target Python 3.14 to match CinderX's core architecture requirements
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # 2. Pin the virtual environment to the 3.14 runtime built by the runner
      - name: Create venv
        run: uv venv --python "$pythonLocation/bin/python"

      - name: Install pytest
        run: uv pip install pytest

      # 3. Execute the static compiler tests under Python 3.14
      - name: Run guard phi tests
        run: |
          uv run pytest \
            cinderx/PythonLib/test_cinderx/test_compiler/test_static/test_guard_phi.py \
            -vv
