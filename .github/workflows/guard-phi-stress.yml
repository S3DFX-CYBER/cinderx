name: Guard Phi Research

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create venv
        run: uv venv

      - name: Install pytest
        run: uv pip install pytest

      - name: Run guard phi tests
        run: |
          uv run pytest \
            cinderx/PythonLib/test_cinderx/test_compiler/test_static/test_guard_phi.py \
            -vv
