name: LOAD_LOCAL Research PoC

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Environment
        run: |
          echo "Python Version:"
          python --version

          echo "Working Directory:"
          pwd

          echo "Repository Contents:"
          ls -la

          echo "TestScripts Contents:"
          ls -la TestScripts || true

      - name: Run LOAD_LOCAL Research Script
        run: |
          python TestScripts/load_local_poc.py
